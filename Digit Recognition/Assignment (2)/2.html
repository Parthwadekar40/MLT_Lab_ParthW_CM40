<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MNIST Draw & Classify</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<style>
  body { font-family: monospace; background: #111; color: #eee; padding: 2rem; max-width: 500px; margin: auto; }
  h2 { color: #00f5c4; }
  canvas { background: #000; border: 2px solid #333; border-radius: 8px; cursor: crosshair; display: block; margin: 1rem 0; }
  .btns { display: flex; gap: 0.8rem; margin-bottom: 1rem; }
  button { background: #00f5c4; color: #111; border: none; padding: 0.55rem 1.2rem; font-family: monospace; font-size: 0.9rem; cursor: pointer; border-radius: 6px; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #clear-btn { background: #333; color: #eee; }
  #result { font-size: 1.1rem; margin-top: 0.5rem; min-height: 1.5rem; }
  #result span { color: #00f5c4; font-size: 1.6rem; }
</style>
</head>
<body>

<h2>MNIST — Draw & Classify</h2>
<button id="train-btn">▶ Train Model First</button>
<canvas id="canvas" width="280" height="280"></canvas>
<div class="btns">
  <button id="clear-btn">✕ Clear</button>
  <button id="predict-btn" disabled>◆ Classify</button>
</div>
<div id="result">Train the model, then draw a digit.</div>

<script>
const SPRITE = 'https://storage.googleapis.com/learnjs-data/model-builder/mnist_images.png';
const LABELS = 'https://storage.googleapis.com/learnjs-data/model-builder/mnist_labels_uint8';
let model = null, isDrawing = false;

// ── Canvas setup ──────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
ctx.fillStyle = '#000'; ctx.fillRect(0,0,280,280);
ctx.strokeStyle = '#fff'; ctx.lineWidth = 18; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

function pos(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left) * (280/r.width), y: (src.clientY - r.top) * (280/r.height) };
}
canvas.addEventListener('mousedown',  e => { isDrawing=true; ctx.beginPath(); const p=pos(e); ctx.moveTo(p.x,p.y); });
canvas.addEventListener('mousemove',  e => { if(!isDrawing) return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); });
canvas.addEventListener('mouseup',    () => isDrawing=false);
canvas.addEventListener('mouseleave', () => isDrawing=false);
canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing=true; ctx.beginPath(); const p=pos(e); ctx.moveTo(p.x,p.y); }, {passive:false});
canvas.addEventListener('touchmove',  e => { e.preventDefault(); if(!isDrawing) return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); }, {passive:false});
canvas.addEventListener('touchend',   () => isDrawing=false);

document.getElementById('clear-btn').onclick = () => {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,280,280);
  document.getElementById('result').innerHTML = 'Draw a digit and click Classify.';
  console.log('[MNIST] Canvas cleared.');
};

// ── Preprocess: crop → center → 28x28 ────────────────────────────
function preprocess() {
  const raw = ctx.getImageData(0,0,280,280);
  let minX=280,maxX=0,minY=280,maxY=0;
  for (let y=0;y<280;y++) for (let x=0;x<280;x++) {
    if (raw.data[(y*280+x)*4] > 20) {
      if(x<minX)minX=x; if(x>maxX)maxX=x;
      if(y<minY)minY=y; if(y>maxY)maxY=y;
    }
  }
  if (minX>=maxX || minY>=maxY) return null;
  const pad=20;
  minX=Math.max(0,minX-pad); minY=Math.max(0,minY-pad);
  maxX=Math.min(280,maxX+pad); maxY=Math.min(280,maxY+pad);
  const off = document.createElement('canvas'); off.width=off.height=28;
  const oc = off.getContext('2d');
  oc.fillStyle='#000'; oc.fillRect(0,0,28,28);
  const cw=maxX-minX, ch=maxY-minY;
  const scale = 20/Math.max(cw,ch);
  const dw=cw*scale, dh=ch*scale;
  oc.drawImage(canvas, minX,minY,cw,ch, (28-dw)/2,(28-dh)/2, dw,dh);
  console.log(`[MNIST] Preprocessed: crop(${minX},${minY},${cw}x${ch}) → centered 20px in 28x28`);
  return oc.getImageData(0,0,28,28);
}

// ── Train ─────────────────────────────────────────────────────────
document.getElementById('train-btn').onclick = async () => {
  const btn = document.getElementById('train-btn');
  btn.disabled = true; btn.textContent = 'Loading data…';
  console.log('[MNIST] Fetching sprite + labels…');

  const [imgSprite, labelBuf] = await Promise.all([
    new Promise((res,rej) => {
      const img = new Image(); img.crossOrigin='anonymous';
      img.onload=()=>res(img); img.onerror=()=>rej(new Error('sprite failed'));
      img.src = SPRITE;
    }),
    fetch(LABELS).then(r=>r.arrayBuffer())
  ]);

  const labels = new Uint8Array(labelBuf);
  const c2 = document.createElement('canvas');
  c2.width=imgSprite.width; c2.height=imgSprite.height;
  c2.getContext('2d').drawImage(imgSprite,0,0);
  const raw2 = c2.getContext('2d').getImageData(0,0,c2.width,c2.height).data;
  const pixels = new Float32Array(raw2.length/4);
  for (let i=0;i<pixels.length;i++) pixels[i]=raw2[i*4]/255;
  console.log('[MNIST] Data loaded — 65000 samples available');

  // Balanced: 1000 per class
  const PER=1000, counts=new Array(10).fill(0), idx=[];
  for (let i=0;i<65000;i++) {
    let d=-1; for(let c=0;c<10;c++) if(labels[i*10+c]===1){d=c;break;}
    if(d>=0&&counts[d]<PER){idx.push(i);counts[d]++;}
    if(idx.length===PER*10) break;
  }
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  const N=idx.length, split=Math.floor(N*0.9);
  const xData=new Float32Array(N*784), yData=new Float32Array(N*10);
  idx.forEach((src,i)=>{ xData.set(pixels.slice(src*784,(src+1)*784),i*784); yData.set(labels.slice(src*10,(src+1)*10),i*10); });
  console.log(`[MNIST] Balanced classes: ${counts.join(', ')} | Train: ${split} | Val: ${N-split}`);

  const xs_tr=tf.tensor4d(xData.slice(0,split*784),[split,28,28,1]);
  const ys_tr=tf.tensor2d(yData.slice(0,split*10), [split,10]);
  const xs_te=tf.tensor4d(xData.slice(split*784),  [N-split,28,28,1]);
  const ys_te=tf.tensor2d(yData.slice(split*10),   [N-split,10]);

  // Build model
  model = tf.sequential();
  model.add(tf.layers.conv2d({inputShape:[28,28,1],filters:32,kernelSize:3,activation:'relu',padding:'same'}));
  model.add(tf.layers.maxPooling2d({poolSize:2}));
  model.add(tf.layers.conv2d({filters:64,kernelSize:3,activation:'relu',padding:'same'}));
  model.add(tf.layers.maxPooling2d({poolSize:2}));
  model.add(tf.layers.flatten());
  model.add(tf.layers.dense({units:64,activation:'relu'}));
  model.add(tf.layers.dropout({rate:0.3}));
  model.add(tf.layers.dense({units:10,activation:'softmax'}));
  model.compile({optimizer:'adam',loss:'categoricalCrossentropy',metrics:['accuracy']});
  console.log(`[MNIST] Model built — ${model.countParams().toLocaleString()} params`);

  btn.textContent = 'Training…';
  await model.fit(xs_tr, ys_tr, {
    epochs:5, batchSize:128,
    callbacks: {
      onEpochEnd: (epoch, logs) => {
        console.log(`[MNIST] Epoch ${epoch+1}/5 — loss: ${logs.loss.toFixed(4)} | acc: ${(logs.acc*100).toFixed(2)}%`);
        btn.textContent = `Epoch ${epoch+1}/5…`;
      }
    }
  });

  // Evaluate
  const [loss, acc] = model.evaluate(xs_te, ys_te);
  const accVal = (await acc.data())[0];
  const lossVal = (await loss.data())[0];
  console.log(`[MNIST] ── Final Evaluation ──`);
  console.log(`[MNIST] Test Loss:     ${lossVal.toFixed(4)}`);
  console.log(`[MNIST] Test Accuracy: ${(accVal*100).toFixed(2)}%`);

  xs_tr.dispose(); ys_tr.dispose(); xs_te.dispose(); ys_te.dispose();
  document.getElementById('predict-btn').disabled = false;
  btn.textContent = '↺ Retrain'; btn.disabled = false;
  document.getElementById('result').innerHTML = `Model ready — acc: <span>${(accVal*100).toFixed(1)}%</span>. Draw a digit!`;
};

// ── Classify ──────────────────────────────────────────────────────
document.getElementById('predict-btn').onclick = () => {
  if (!model) return;
  const imgData = preprocess();
  if (!imgData) { console.warn('[MNIST] Canvas is empty!'); return; }

  const t0 = performance.now();
  const input = tf.tidy(() => tf.browser.fromPixels(imgData,1).toFloat().div(255).reshape([1,28,28,1]));
  const probs = Array.from(model.predict(input).dataSync());
  input.dispose();
  const ms = (performance.now()-t0).toFixed(1);

  const top = probs.indexOf(Math.max(...probs));
  const sorted = probs.map((p,i)=>({d:i,p})).sort((a,b)=>b.p-a.p);

  console.log(`[MNIST] ── Prediction (${ms}ms) ──`);
  console.log(`[MNIST] Predicted digit : ${top}`);
  console.log(`[MNIST] Confidence      : ${(probs[top]*100).toFixed(2)}%`);
  console.log(`[MNIST] Top-3           : ${sorted.slice(0,3).map(x=>`${x.d}(${(x.p*100).toFixed(1)}%)`).join(' > ')}`);
  console.log(`[MNIST] All probs       : ${probs.map((p,i)=>i+':'+(p*100).toFixed(1)+'%').join(' | ')}`);

  document.getElementById('result').innerHTML = `Predicted: <span>${top}</span> &nbsp; confidence: ${(probs[top]*100).toFixed(1)}%`;
};

console.log('[MNIST] Page loaded — open DevTools (F12) to see outputs');
tf.ready().then(() => console.log('[MNIST] TF backend: ' + tf.getBackend()));
</script>
</body>
</html>
