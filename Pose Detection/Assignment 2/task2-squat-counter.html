<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Task 2 – Squat Counter</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet@2.2.2/dist/posenet.min.js"></script>
<style>
  body{margin:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;color:#fff;}
  h2{margin-bottom:10px;color:#60a5fa;letter-spacing:1px;}
  #status{margin-bottom:8px;font-size:13px;color:#facc15;}
  .wrap{position:relative;width:640px;height:480px;}
  video{position:absolute;opacity:0;pointer-events:none;}
  canvas{position:absolute;top:0;left:0;border-radius:8px;}
  #stats{display:flex;gap:20px;margin-top:12px;}
  .box{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px 28px;text-align:center;}
  .num{font-size:42px;font-weight:700;color:#60a5fa;}
  .lbl{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;}
  #phase-bar{margin-top:10px;font-size:18px;font-weight:700;letter-spacing:2px;}
</style>
</head>
<body>
<h2>Task 2 — Squat Rep Counter</h2>
<div id="status">Loading model…</div>
<div class="wrap">
  <video id="vid" width="640" height="480" autoplay muted playsinline></video>
  <canvas id="c" width="640" height="480"></canvas>
</div>
<div id="stats">
  <div class="box"><div class="num" id="reps">0</div><div class="lbl">Reps</div></div>
  <div class="box"><div class="num" id="angle-disp">—</div><div class="lbl">Knee Angle °</div></div>
  <div class="box"><div class="num" id="conf-disp">—</div><div class="lbl">Confidence %</div></div>
</div>
<div id="phase-bar">Phase: —</div>

<script>
const vid    = document.getElementById('vid');
const c      = document.getElementById('c');
const ctx    = c.getContext('2d');
const status = document.getElementById('status');

// Rep counter state
let repCount = 0;
let phase = 'up'; // 'up' | 'down'

// Thresholds (degrees)
const DOWN_THRESHOLD = 100; // knee angle below this = squatting down
const UP_THRESHOLD   = 160; // knee angle above this = standing up

// Skeleton pairs (index into keypoints array)
const SKELETON = [
  [5,6],[5,7],[7,9],[6,8],[8,10],
  [5,11],[6,12],[11,12],
  [11,13],[13,15],[12,14],[14,16],
];

// Compute angle at joint B given points A, B, C
function angle(A, B, C) {
  const BA = { x: A.x - B.x, y: A.y - B.y };
  const BC = { x: C.x - B.x, y: C.y - B.y };
  const dot = BA.x * BC.x + BA.y * BC.y;
  const mag = Math.sqrt(BA.x**2 + BA.y**2) * Math.sqrt(BC.x**2 + BC.y**2);
  if (mag === 0) return 0;
  return Math.round(Math.acos(Math.min(1, Math.max(-1, dot / mag))) * (180 / Math.PI));
}

async function main() {
  const net = await posenet.load({
    architecture: 'MobileNetV1',
    outputStride: 16,
    inputResolution: { width: 640, height: 480 },
    multiplier: 0.75
  });
  status.textContent = 'Model ready — starting camera…';

  const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
  vid.srcObject = stream;
  await new Promise(r => vid.onloadeddata = r);
  status.textContent = '● Detecting — stand in full view, then squat!';

  async function loop() {
    const pose = await net.estimateSinglePose(vid, { flipHorizontal: true });
    const kp   = pose.keypoints;

    // Mirror video
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(vid, -640, 0, 640, 480);
    ctx.restore();

    // Draw skeleton
    SKELETON.forEach(([i, j]) => {
      if (kp[i].score > 0.4 && kp[j].score > 0.4) {
        ctx.beginPath();
        ctx.moveTo(kp[i].position.x, kp[i].position.y);
        ctx.lineTo(kp[j].position.x, kp[j].position.y);
        ctx.strokeStyle = '#60a5fa';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    });

    // Draw dots
    kp.forEach(k => {
      if (k.score > 0.4) {
        ctx.beginPath();
        ctx.arc(k.position.x, k.position.y, 5, 0, 2 * Math.PI);
        ctx.fillStyle = '#facc15';
        ctx.fill();
      }
    });

    // --- Squat logic ---
    // Use LEFT knee: hip(11) → knee(13) → ankle(15)
    // Use RIGHT knee: hip(12) → knee(14) → ankle(16)
    const lHip = kp[11], lKnee = kp[13], lAnkle = kp[15];
    const rHip = kp[12], rKnee = kp[14], rAnkle = kp[16];

    let kneeAngle = null;
    let usedSide  = '';

    // Prefer whichever side has better confidence
    const lConf = Math.min(lHip.score, lKnee.score, lAnkle.score);
    const rConf = Math.min(rHip.score, rKnee.score, rAnkle.score);

    if (lConf > 0.4 || rConf > 0.4) {
      if (lConf >= rConf && lConf > 0.4) {
        kneeAngle = angle(lHip.position, lKnee.position, lAnkle.position);
        usedSide  = 'L';
      } else if (rConf > 0.4) {
        kneeAngle = angle(rHip.position, rKnee.position, rAnkle.position);
        usedSide  = 'R';
      }
    }

    if (kneeAngle !== null) {
      // Draw angle label on the knee
      const kneePos = usedSide === 'L' ? lKnee.position : rKnee.position;
      ctx.font = 'bold 16px monospace';
      ctx.fillStyle = '#fff';
      ctx.fillText(kneeAngle + '°', kneePos.x + 8, kneePos.y - 8);

      // Rep counting state machine
      if (kneeAngle < DOWN_THRESHOLD && phase === 'up') {
        phase = 'down';
      } else if (kneeAngle > UP_THRESHOLD && phase === 'down') {
        phase = 'up';
        repCount++;
        document.getElementById('reps').textContent = repCount;
      }

      // UI updates
      document.getElementById('angle-disp').textContent = kneeAngle;
      document.getElementById('angle-disp').style.color = kneeAngle < DOWN_THRESHOLD ? '#f87171' : '#4ade80';

      const avgConf = Math.round(((lConf > rConf ? lConf : rConf)) * 100);
      document.getElementById('conf-disp').textContent = avgConf;

      const phaseText = phase === 'down' ? '⬇ DOWN' : '⬆ UP';
      document.getElementById('phase-bar').textContent = `Phase: ${phaseText}  |  Side: ${usedSide}`;
      document.getElementById('phase-bar').style.color = phase === 'down' ? '#f87171' : '#4ade80';
    } else {
      document.getElementById('phase-bar').textContent = 'Phase: — (keypoints not visible)';
      document.getElementById('phase-bar').style.color = '#94a3b8';
    }

    requestAnimationFrame(loop);
  }

  loop();
}

main().catch(e => { status.textContent = 'Error: ' + e.message; });
</script>
</body>
</html>
