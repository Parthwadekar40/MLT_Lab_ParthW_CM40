<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Task 1 – Pose Skeleton</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet@2.2.2/dist/posenet.min.js"></script>
<style>
  body{margin:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;color:#fff;}
  h2{margin-bottom:12px;color:#4ade80;letter-spacing:1px;}
  #status{margin-bottom:10px;font-size:13px;color:#facc15;}
  .wrap{position:relative;width:640px;height:480px;}
  video{position:absolute;opacity:0;pointer-events:none;}
  canvas{position:absolute;top:0;left:0;border-radius:8px;}
</style>
</head>
<body>
<h2>Task 1 — Pose Keypoints &amp; Skeleton</h2>
<div id="status">Loading model…</div>
<div class="wrap">
  <video id="vid" width="640" height="480" autoplay muted playsinline></video>
  <canvas id="c" width="640" height="480"></canvas>
</div>

<script>
const vid = document.getElementById('vid');
const c   = document.getElementById('c');
const ctx = c.getContext('2d');
const status = document.getElementById('status');

// All 17 PoseNet keypoint names in order
const KP_NAMES = [
  'nose','leftEye','rightEye','leftEar','rightEar',
  'leftShoulder','rightShoulder','leftElbow','rightElbow',
  'leftWrist','rightWrist','leftHip','rightHip',
  'leftKnee','rightKnee','leftAnkle','rightAnkle'
];

// Pairs of keypoints to draw as limb lines
const SKELETON = [
  [5,6],[5,7],[7,9],[6,8],[8,10],   // arms
  [5,11],[6,12],[11,12],             // torso
  [11,13],[13,15],[12,14],[14,16],   // legs
  [0,1],[0,2],[1,3],[2,4]            // face
];

async function main() {
  // 1. Load model
  const net = await posenet.load({
    architecture: 'MobileNetV1',
    outputStride: 16,
    inputResolution: { width: 640, height: 480 },
    multiplier: 0.75
  });
  status.textContent = 'Model ready — starting camera…';

  // 2. Start webcam
  const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
  vid.srcObject = stream;
  await new Promise(r => vid.onloadeddata = r);
  status.textContent = '● Live — single-pose detection';

  // 3. Detection loop
  async function loop() {
    const pose = await net.estimateSinglePose(vid, { flipHorizontal: true });

    // Draw mirrored video frame
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(vid, -640, 0, 640, 480);
    ctx.restore();

    // Draw skeleton lines
    SKELETON.forEach(([i, j]) => {
      const a = pose.keypoints[i];
      const b = pose.keypoints[j];
      if (a.score > 0.4 && b.score > 0.4) {
        ctx.beginPath();
        ctx.moveTo(a.position.x, a.position.y);
        ctx.lineTo(b.position.x, b.position.y);
        ctx.strokeStyle = '#4ade80';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    });

    // Draw keypoint dots
    pose.keypoints.forEach(kp => {
      if (kp.score > 0.4) {
        ctx.beginPath();
        ctx.arc(kp.position.x, kp.position.y, 5, 0, 2 * Math.PI);
        ctx.fillStyle = '#facc15';
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    });

    // Show avg confidence
    const avg = pose.keypoints.reduce((s, k) => s + k.score, 0) / pose.keypoints.length;
    status.textContent = `● Live — avg confidence: ${(avg * 100).toFixed(1)}%`;

    requestAnimationFrame(loop);
  }

  loop();
}

main().catch(e => { status.textContent = 'Error: ' + e.message; console.error(e); });
</script>
</body>
</html>
