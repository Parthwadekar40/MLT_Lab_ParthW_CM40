<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MobileNet Classifier</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
<style>
  body {
    font-family: sans-serif;
    max-width: 480px;
    margin: 60px auto;
    padding: 0 20px;
    background: #f5f5f5;
    color: #222;
  }

  h2 { margin-bottom: 4px; }
  p  { color: #666; font-size: 14px; margin-bottom: 24px; }

  #upload-box {
    border: 2px dashed #aaa;
    border-radius: 10px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    background: #fff;
    transition: border-color 0.2s;
  }
  #upload-box:hover { border-color: #4f8ef7; }
  #upload-box input  { display: none; }
  #upload-box span   { color: #888; font-size: 14px; }

  #preview {
    display: none;
    width: 100%;
    max-height: 260px;
    object-fit: contain;
    border-radius: 8px;
    margin-top: 20px;
    background: #eee;
  }

  #classify-btn {
    display: none;
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: #4f8ef7;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
  }
  #classify-btn:hover  { background: #3a7ae0; }
  #classify-btn:disabled { background: #aac4f5; cursor: not-allowed; }

  #status { font-size: 13px; color: #888; margin-top: 10px; min-height: 20px; }

  #results { margin-top: 20px; }

  .result-row {
    background: #fff;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .result-row .label {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .result-row .label span { color: #4f8ef7; }
  .bar-bg {
    height: 8px;
    background: #eef;
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: #4f8ef7;
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .result-row:nth-child(2) .bar-fill { background: #f74fa0; }
  .result-row:nth-child(3) .bar-fill { background: #f7a94f; }
</style>
</head>
<body>

<h2>🔍 MobileNet Classifier</h2>
<p>Upload any image — top 3 predictions shown instantly in your browser.</p>

<div id="upload-box" onclick="document.getElementById('file-input').click()">
  <input type="file" id="file-input" accept="image/*"/>
  <span>Click to upload an image</span>
</div>

<img id="preview" alt="preview"/>
<button id="classify-btn" disabled>Classify Image</button>
<div id="status">Loading model…</div>
<div id="results"></div>

<script>
  let model = null;

  const fileInput   = document.getElementById('file-input');
  const preview     = document.getElementById('preview');
  const btn         = document.getElementById('classify-btn');
  const status      = document.getElementById('status');
  const results     = document.getElementById('results');
  const uploadBox   = document.getElementById('upload-box');

  // Load MobileNet on page load
  mobilenet.load().then(m => {
    model = m;
    status.textContent = '✅ Model ready. Upload an image to classify.';
    if (preview.src) btn.disabled = false;
  });

  // Show preview when file selected
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = 'block';
      btn.style.display = 'block';
      uploadBox.querySelector('span').textContent = file.name;
      results.innerHTML = '';
      status.textContent = 'Image ready. Click Classify.';
      if (model) btn.disabled = false;
    };
    reader.readAsDataURL(file);
  });

  // Classify on button click
  btn.addEventListener('click', async () => {
    if (!model || !preview.src) return;
    btn.disabled = true;
    status.textContent = 'Running inference…';
    results.innerHTML = '';

    const predictions = await model.classify(preview, 3);

    results.innerHTML = predictions.map(p => {
      const pct = (p.probability * 100).toFixed(1);
      const label = p.className.split(',')[0];
      return `
        <div class="result-row">
          <div class="label">${label}<span>${pct}%</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:0%" data-w="${pct}%"></div></div>
        </div>`;
    }).join('');

    // Animate bars
    requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill').forEach(b => b.style.width = b.dataset.w);
    });

    status.textContent = '✅ Done!';
    btn.disabled = false;
  });
</script>
</body>
</html>
