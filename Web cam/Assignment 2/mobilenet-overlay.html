<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MobileNet — Live Overlay</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e0e0e; color: #eee; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 14px; }
  h2 { font-size: 18px; color: #aaa; letter-spacing: 1px; }
  #wrap { position: relative; width: 640px; height: 480px; border-radius: 8px; overflow: hidden; background: #000; }
  video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  canvas { pointer-events: none; }
  button { padding: 10px 28px; background: #00c9a7; border: none; color: #111; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; }
  button:hover { background: #00b096; }
  #status { font-size: 13px; color: #666; }
</style>
</head>
<body>
<h2>MobileNet Live Overlay</h2>
<div id="wrap">
  <video id="cam" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>
</div>
<button id="btn">Start Camera</button>
<div id="status">Idle</div>

<script>
let model, intervalId;
const video  = document.getElementById('cam');
const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');
const btn    = document.getElementById('btn');
const status = document.getElementById('status');

btn.addEventListener('click', async () => {
  if (intervalId) {
    clearInterval(intervalId);
    intervalId = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    btn.textContent = 'Start Camera';
    status.textContent = 'Stopped';
    return;
  }

  btn.disabled = true;
  status.textContent = 'Loading model…';
  if (!model) model = await mobilenet.load();

  const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
  video.srcObject = stream;
  await video.play();

  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;

  btn.disabled = false;
  btn.textContent = 'Stop';
  status.textContent = 'Classifying…';

  intervalId = setInterval(async () => {
    const preds = await model.classify(video, 3);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawLabels(preds);
  }, 800);
});

function drawLabels(preds) {
  const pad = 14, lineH = 28, fontSize = 15;
  const boxW = 280, boxH = preds.length * lineH + pad * 2;
  const x = 16, y = 16;

  // Background panel
  ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
  roundRect(ctx, x, y, boxW, boxH, 8);
  ctx.fill();

  // Border
  ctx.strokeStyle = '#00c9a7';
  ctx.lineWidth = 1.5;
  roundRect(ctx, x, y, boxW, boxH, 8);
  ctx.stroke();

  // Labels
  preds.forEach((p, i) => {
    const name = p.className.split(',')[0];
    const conf = (p.probability * 100).toFixed(1) + '%';
    const ty   = y + pad + fontSize + i * lineH;

    // Confidence bar
    const barX = x + pad, barY = ty - fontSize + 2;
    const barMaxW = boxW - pad * 2;
    const barW    = barMaxW * p.probability;
    ctx.fillStyle = 'rgba(0,201,167,0.18)';
    ctx.fillRect(barX, barY, barW, lineH - 6);

    // Label text
    ctx.fillStyle = '#ffffff';
    ctx.font = `${fontSize}px sans-serif`;
    ctx.fillText(name, barX + 6, ty);

    // Confidence text
    ctx.fillStyle = '#00c9a7';
    ctx.font = `bold ${fontSize}px sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText(conf, x + boxW - pad, ty);
    ctx.textAlign = 'left';
  });

  // Top label badge on video
  if (preds.length > 0) {
    const top  = preds[0].className.split(',')[0];
    const conf = (preds[0].probability * 100).toFixed(0) + '%';
    const bx   = canvas.width / 2;
    const by   = canvas.height - 28;
    const text = `${top}  ${conf}`;

    ctx.font = 'bold 16px sans-serif';
    const tw = ctx.measureText(text).width;
    ctx.fillStyle = 'rgba(0,201,167,0.85)';
    roundRect(ctx, bx - tw / 2 - 12, by - 20, tw + 24, 30, 6);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.fillText(text, bx - tw / 2, by);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}
</script>
</body>
</html>
